<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FAVICON -->
    <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
    <!-- CSS -->
    <link rel="stylesheet" href="/css/styles.css">
    <!-- JS -->
    <script src="/js/services/util.service.js" defer></script>
    <script src="/js/services/user.service.js" defer></script>
    <script src="/js/controllers/user.controller.js" defer></script>
    <title>Place Keeper - Settings</title>
</head>

<body onload="onInit()">
    <header class="main-header">
        <div class="logo">Place<span class="logo-symbol fab"></span>Keeper</div>

        <nav class="main-nav">
            <ul class="grid grid-column clean-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="user-settings.html" class="active">Settings</a></li>
                <li><a href="places.html">Places</a></li>
            </ul>
        </nav>

        <button class="btn-toggle-menu btn rounded hover" type="button"
            onclick="onToggleMenu()">☰</button>
    </header>

    <main class="main-content">
        <form class="settings-form full" onsubmit="onSaveUser()">
            <hgroup class="form-header">
                <h2>Set Your Settings</h2>
            </hgroup>

            <label for="email">E-Mail:</label>
            <input required id="email" type="email" name="email" placeholder="Insert your email"
                autofocus autocomplete="on">

            <label for="ageInput">Age:</label>
            <div class="age-container">
                <input required id="ageInput" type="range" name="age" min="18" max="120" value="18"
                    oninput="ageOutput.value = ageInput.value" onchange="birthDate.value=''">
                <output id="ageOutput" for="ageInput">18</output>
            </div>

            <label for="bgColor">Set Background Color:</label>
            <input required type="color" name="bgColor" id="bgColor">

            <label for="txtColor">Set Text Color:</label>
            <input required type="color" name="txtColor" id="txtColor">

            <label for="birthDate">Birth Date:</label>
            <input required type="date" name="birthDate" id="birthDate" autocomplete="on"
                onchange="onRenderAgeByBirthDate()">

            <label for="birthTime">Birth Time:</label>
            <input required type="time" name="birthTime" id="birthTime"
                onchange="onRenderAgeByBirthDate()">

            <label for="gender">Gender:</label>
            <input required type="text" name="gender" id="gender" list="genderList"
                placeholder="Insert your gender" pattern="^(Male|Female|Other){1}$">

            <datalist id="genderList">
                <option value="Male"></option>
                <option value="Female"></option>
                <option value="Other"></option>
            </datalist>

            <label for="initZoom">Initial Zoom:</label>
            <input required id="initZoom" type="number" name="initZoom"
                placeholder="Insert initial Zoom" min="0" max="100" step="1">

            <label for="initLat">Initial Decimal Location (lat, lng):</label>
            <div class="init-loc-container">
                <input required id="initLat" type="number" name="initLat" placeholder="Insert lat"
                    min="-90" max="90" step=".000001">
                <input required id="initLng" type="number" name="initLng" placeholder="Insert lng"
                    min="-180" max="180" step=".000001">
            </div>

            <div class="btns-container">
                <button class="btn rounded hover" type="submit">Save</button>
                <button class="btn rounded hover" type="button"
                    onclick="onClearForm()">Clear</button>
            </div>
        </form>
    </main>

    <video class="main-hero" autoplay muted loop playsinline>
        <source src="/videos/hero.mp4">
        Your browser doesn't support the video tag.
    </video>

    <footer class="main-footer">
        <div class="logo">Place<span class="logo-symbol fab"></span>Keeper</div>
        <small class="footer-rights">© 2026 PlaceKeeper - All Rights Reserved.</small>
    </footer>
</body>

</html>
